name: pod5_env

channels:
  - nanoporetech
  - bioconda
  - conda-forge

dependencies:
  - python=3.11

  # Core ONT
  - pod5=0.3.23

  # Mapping / consensus
  - minimap2=2.28
  - samtools=1.20
  - bcftools=1.20
  - bedtools=2.31.1

  # Utilities
  - seqkit=2.8.0
  - pigz=2.8
  - parallel=20250222

  # Python scientific stack
  - pandas=2.2
  - numpy=1.26
  - matplotlib=3.10
  - pysam=0.22
  - biopython=1.85

  # HTSlib
  - htslib=1.20